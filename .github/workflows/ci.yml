name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package and development tools
        run: python -m pip install --upgrade pip && python -m pip install ".[dev]"

      - name: Check formatting with Black
        run: python -m black --check marker_pdf_agent tests

      - name: Lint with Ruff
        run: python -m ruff check marker_pdf_agent tests

      - name: Lint with Flake8
        run: python -m flake8 marker_pdf_agent tests

      - name: Type check with Mypy
        run: python -m mypy marker_pdf_agent tests

      - name: Build source and wheel distributions
        run: python -m build

  tests:
    name: Tests on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test tools
        run: python -m pip install --upgrade pip && python -m pip install ".[dev]"

      - name: Run deterministic tests
        run: python -m pytest tests/test_worker.py -m "not live_ollama" -q
